<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Media Connect</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="queries.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>
  <body>
    <div class="social-media-title">
      <h1>SHRIRANG APPA BARNE</h1>
      <h4>Connect with Appa on social media</h4>
    </div>

    <div class="fty">
      <div class="eyebrow-heading">नेत्याचे कार्य, जनतेशी नाते</div>
      <h2>जनतेच्या सेवेत सदैव कार्यरत</h2>
      <div class="fty-container">
        <div class="like">
          <div class="fty-header">
            <a
              href="https://www.facebook.com/shrirangchandubarne"
              target="_blank"
              ><div>
                <i class="fa-brands fa-facebook"></i>&nbsp;&nbsp;लाइक
              </div></a
            >
          </div>
          <div class="fty-content">
            <div
              class="fb-page"
              data-href="https://www.facebook.com/shrirangchandubarne"
              data-tabs="timeline"
              data-width="450"
              data-height="600"
              data-small-header="false"
              data-adapt-container-width="true"
              data-hide-cover="false"
              data-show-facepile="true"
            >
              <blockquote
                cite="https://www.facebook.com/shrirangchandubarne"
                class="fb-xfbml-parse-ignore"
              >
                <a href="https://www.facebook.com/shrirangchandubarne"
                  >Shrirang Appa Barne</a
                >
              </blockquote>
            </div>
          </div>
        </div>
        <div class="follow">
          <div class="fty-header">
            <a
              href="https://www.instagram.com/shrirangappabarne/"
              target="_blank"
              ><div>
                <i class="fa-brands fa-instagram"></i>&nbsp;&nbsp; फॉलो
              </div></a
            >
          </div>
          <div class="fty-content">
            <!-- Elfsight Instagram Feed | Untitled Instagram Feed -->
            <script
              src="https://static.elfsight.com/platform/platform.js"
              async
            ></script>
            <div
              class="elfsight-app-37ee92e4-6574-43ce-a430-975babc130b7"
              data-elfsight-app-lazy
            ></div>
          </div>
        </div>
        <div class="subscribe">
          <div class="fty-header">
            <a href="https://x.com/MPShrirangBarne" target="_blank"
              ><div>
                <i class="fa-brands fa-x-twitter"></i>&nbsp;&nbsp;ट्वीट
              </div></a
            >
          </div>
          <div class="fty-content">
            <script
              src="https://static.elfsight.com/platform/platform.js"
              async
            ></script>
            <div
              class="elfsight-app-519d4301-19d9-43dc-a329-b02ccb604e2b"
              data-elfsight-app-lazy
            ></div>
          </div>
        </div>
      </div>
    </div>

    <footer>© 2025 Shrirang Appa Barne. All Rights Reserved.</footer>
    <script
      src="https://widgets.sociablekit.com/twitter-hashtag-feed/widget.js"
      defer
    ></script>
    <script
      async
      defer
      crossorigin="anonymous"
      src="https://connect.facebook.net/mr_IN/sdk.js#xfbml=1&version=v23.0"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
