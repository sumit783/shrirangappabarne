<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown to 16 Feb</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: "Poppins", sans-serif;
        text-align: center;
      }

      .container {
        width: 50vw;
        min-height: 100vh;
        padding: 0 100px;
        min-width: 400px;
        border-radius: 20px;
        background-color: #ffffff;
        box-shadow: 0 0 3em rgba(0, 0, 0, 0.2);
        z-index: 2;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .container h1 {
        text-align: center;
        font-size: 32px;
        letter-spacing: 1px;
        color: #000000;
      }
      .container p {
        color: #000000;
        line-height: 0;
      }
      .timer {
        display: flex;
        gap: 25px;
        justify-content: center;
        position: relative;
        top: 50px;
      }

      .box {
        background-image: linear-gradient(
          45deg,
          #9a5916 10%,
          #e4b04d 18%,
          #fff1a3 22%,
          #e7b14f 40%,
          #ae6f27 68%,
          #f8c65d 80%,
          #ffffff 100%
        );
        padding: 10px;
        border-radius: 15px;
        width: 80px;
      }

      .number {
        color: #ffffff;
        font-size: 40px;
        font-weight: bold;
      }

      .label {
        color: #000000;
        font-size: 14px;
        margin-top: 5px;
        opacity: 0.8;
      }
      .background {
        position: absolute;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        background: url("images/happy-birthday-card-design.jpg.jpeg");
        background-size: cover;
        z-index: -1;
      }
      #mainTitle {
        font-size: 30px;
        font-weight: bold;
        background-image: linear-gradient(
          to right,
          #462523 0,
          #cb9b51 22%,
          #f6e27a 45%,
          #f6f2c0 50%,
          #f6e27a 55%,
          #cb9b51 78%,
          #462523 100%
        );
        color: transparent;
        -webkit-background-clip: text;
      }
      #subtitle {
        font-size: 16px;
        font-weight: bold;
      }
      /* Canvas covers full screen */
      #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999;
      }

      .wishes-section {
        background-color: #000000;

        position: relative;
        z-index: 2;
        text-align: center;
        color: white;
        width: 100vw;
      }

      .wishes-grid {
        display: grid;
        grid-template-columns: repeat(3, 350px);
        align-items: start;
        justify-content: center;
        gap: 2em;
        margin-top: 30px;
      }
      .wishes-section h2 {
        background-image: linear-gradient(
          to right,
          #462523 0,
          #cb9b51 22%,
          #f6e27a 45%,
          #f6f2c0 50%,
          #f6e27a 55%,
          #cb9b51 78%,
          #462523 100%
        );
        color: transparent;
        -webkit-background-clip: text;
        font-size: 3em;
      }
      .wishes-section h4 {
        color: #ffffff;
        font-size: 2em;
      }
      /* Card */
      .wish-card {
        background: #ffffff;

        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
        text-align: left;
      }

      .wish-name {
        font-weight: bold;
        color: #0a018d;
      }

      .wish-city {
        font-size: 13px;
        opacity: 0.7;
        color: #001843;
      }

      .wish-message {
        margin-top: 10px;
        font-size: 14px;
        color: #000000;
      }
      .wish-card {
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }

      .wish-card:hover {
        transform: scale(1.04);
        box-shadow: 0 18px 30px rgba(0, 0, 0, 0.15);
      }
      #cake {
        margin-top: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        transform: scale(0.7);
      }

      /* ---------------- CANDLES ---------------- */

      .candles-row {
        display: flex;
        gap: 14px;
        align-items: flex-end;
        margin-bottom: -12px;
        z-index: 5;
      }

      /* bigger candles */
      .candle {
        width: 14px;
        height: 55px;
        border-radius: 6px;
        background: repeating-linear-gradient(
          45deg,
          #fd3018 0 6px,
          #ffa89e 6px 12px
        );
        position: relative;
        z-index: 5;
      }

      /* lit */

      /* flame */
      .candle.lit::after {
        content: "";
        position: absolute;
        top: -18px;
        left: 50%;
        transform: translateX(-50%) rotate(45deg);

        width: 16px;
        height: 16px;

        background: radial-gradient(circle, #fff 20%, gold 50%, orange 80%);
        border-radius: 0 50% 50% 50%;
        animation: flicker 0.35s infinite alternate;
      }

      @keyframes flicker {
        from {
          transform: translateX(-50%) rotate(45deg) scale(1);
        }
        to {
          transform: translateX(-50%) rotate(45deg) scale(1.15);
        }
      }

      /* ---------------- CAKE BASE ---------------- */

      #cake {
        position: relative;
      }

      .cake-base {
        position: relative;
        width: 360px;
        z-index: 999;
      }

      /* Common Layer Styling */
      .bottom-layer,
      .middle-layer,
      .top-layer {
        height: 80px;
        width: 100%;
        border-radius: 20px 20px 0 0;
        margin: auto;
        position: relative;
        background-repeat: repeat;
        background-size:
          100% 100%,
          60px 100px;
        background-position: 28px 0;

        /* Pink Strawberry Theme */
        background-image:
          linear-gradient(
            transparent 50px,
            #ff4d6d 50px,
            #ff4d6d 60px,
            transparent 60px
          ),
          radial-gradient(circle at 30px 5px, #e52c5b 30px, #ffc2d1 31px);

        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      }

      /* Layer Stacking Effect */
      .middle-layer {
        transform: scale(0.9);
        margin-top: -15px;
      }

      .top-layer {
        transform: scale(0.8);
        margin-top: -20px;
      }

      .bottom-layer {
        margin-top: -5px;
      }

      /* Optional Cream Glow */
      .bottom-layer::after,
      .middle-layer::after,
      .top-layer::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        height: 10px;
        width: 100%;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 20px 20px 0 0;
      }

      #wish-img {
        display: none;
      }
      /* ===============================
      🎯 3D Gold Button
      =============================== */
      .wish-btn {
        width: 350px;
        display: inline-block;
        margin-top: 50px;
        padding: 14px 32px;

        font-size: 18px;
        font-weight: 700;
        text-decoration: none;
        text-transform: uppercase;

        color: #fff;
        background: linear-gradient(135deg, #ff512f, #dd2476);

        border-radius: 50px;
        border: none;
        margin: 0 auto;

        cursor: pointer;

        box-shadow: 0 8px 20px rgba(221, 36, 118, 0.4);
        transition: all 0.3s ease;

        letter-spacing: 1px;
        animation: pop 3s infinite;

        margin-bottom: 3em;
      }
      @keyframes pop {
        50% {
          transform: scale(1.2);
        }
      }
      /* Hover Effect */
      .wish-btn:hover {
        transform: translateY(-4px) scale(1.05);
        box-shadow: 0 12px 25px rgba(221, 36, 118, 0.6);
      }

      /* Click Effect */
      .wish-btn:active {
        transform: translateY(2px);
        box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
      }

      /* Hover (lift) */
      .wish-btn:hover {
        transform: translateY(-2px);

        box-shadow:
          0 8px 0 #b07d22,
          0 14px 24px rgba(0, 0, 0, 0.3);
      }

      /* Click press effect */
      .wish-btn:active {
        transform: translateY(5px);

        box-shadow:
          0 2px 0 #b07d22,
          0 4px 10px rgba(0, 0, 0, 0.25);
      }

      .wall {
        display: grid;
        grid-template-columns: repeat(3, 250px);
        justify-content: center;
        gap: 15px;
        padding: 20px;
      }

      .card {
        background: #ffffff;
        color: #000000;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      .card h4 {
        color: #001843;
        font-size: 16px;
        text-align: left;
        padding: 0;
        margin: 0;
      }
      .card h5 {
        color: #606060;
        text-align: left;
        margin: 0;
      }
      .card p {
        color: #000000;
        text-align: left;
      }
      .card img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
      }
      .wish-card h3,
      .wish-card p {
        color: #000000;
      }
      #wish-img {
        width: 80%;
        margin: 0 auto;
      }
      /* ========================================
📱 PERFECT MOBILE FIX (≤ 480px)
======================================== */
      @media (max-width: 480px) {
        * {
          box-sizing: border-box;
        }

        body {
          padding: 0;
          overflow-x: hidden;
        }

        /* ================= CONTAINER ================= */
        .container {
          width: 100%;
          min-width: 0; /* VERY IMPORTANT */
          padding: 20px 15px; /* remove 100px padding */
          border-radius: 0;
        }

        /* ================= TITLES ================= */
        #mainTitle {
          font-size: 20px !important;
          width: 100%;
          padding: 0 10px;
        }

        #subtitle {
          font-size: 13px;
          padding: 0 10px;
        }

        /* ================= TIMER ================= */
        .timer {
          gap: 8px;
          top: 20px;
          flex-wrap: wrap; /* prevents overflow */
        }

        .box {
          width: 60px;
          padding: 6px;
        }

        .number {
          font-size: 22px;
        }

        .label {
          font-size: 10px;
        }

        /* ================= BUTTON ================= */
        .wish-btn {
          width: 100%; /* NOT 350px */
          max-width: 320px;
          font-size: 13px;
          padding: 10px;
          margin: 25px auto 0;
        }

        /* ================= WISH SECTION ================= */
        .wishes-section {
          width: 100%;
          padding: 20px 12px;
        }

        .wishes-section h2 {
          font-size: 20px;
        }

        .wishes-section h4 {
          font-size: 13px;
        }

        /* ================= GRID FIX ================= */
        .wall {
          grid-template-columns: 1fr; /* single column */
          gap: 10px;
          padding: 10px 0;
        }

        .card {
          width: 350px;
          padding: 12px;
          margin: 0 auto;
        }

        /* ================= IMAGE ================= */
        #wish-img {
          width: 90%;
          max-width: 260px;
          margin: 0 auto;
          display: block;
        }

        /* ================= BACKGROUND ================= */
        .background {
          background-position: center;
        }
      }
    </style>
  </head>
  <body>
    <img src="images/web-bday.jpeg" id="wish-img" />

    <div class="container">
      <div>
        <h1 id="mainTitle">
          मा. खासदार श्रीरंग आप्पा बारणे साहेबांचा <br />62 वा वाढदिवस उत्सव
        </h1>
        <p id="subtitle">जनतेकडून येणाऱ्या शुभेच्छा उलगडण्यासाठी उलट गणना:</p>
      </div>

      <div class="timer">
        <div class="box">
          <div id="days" class="number">0</div>
          <div class="label">Days</div>
        </div>

        <div class="box">
          <div id="hours" class="number">0</div>
          <div class="label">Hours</div>
        </div>

        <div class="box">
          <div id="minutes" class="number">0</div>
          <div class="label">Minutes</div>
        </div>

        <div class="box">
          <div id="seconds" class="number">0</div>
          <div class="label">Seconds</div>
        </div>
      </div>
      <div id="cake">
        <div id="candlesRow" class="candles-row"></div>
        <div class="cake-base">
          <div class="top-layer"></div>
          <div class="middle-layer"></div>
          <div class="bottom-layer"></div>
        </div>
      </div>
      <form id="birthdayForm" style="margin-top: 40px">
        <input
          type="text"
          name="name"
          placeholder="आपले नाव"
          required
          style="
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            border: 1px solid #ccc;
          "
        /><br /><br />

        <input
          type="tel"
          name="phone"
          placeholder="मोबाईल नंबर"
          required
          style="
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            border: 1px solid #ccc;
          "
        /><br /><br />

        <input
          type="text"
          name="area"
          placeholder="आपला परिसर / गाव"
          required
          style="
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            border: 1px solid #ccc;
          "
        /><br /><br />

        <textarea
          name="message"
          placeholder="आपली शुभेच्छा लिहा..."
          required
          style="
            padding: 10px;
            width: 80%;
            max-width: 400px;
            height: 100px;
            border-radius: 8px;
            border: 1px solid #ccc;
          "
        ></textarea
        ><br /><br />

        <button type="submit" class="wish-btn">शुभेच्छा पाठवा 🎉</button>
      </form>
    </div>
    <div id="wishesSection" class="wishes-section" style="display: none">
      <h2>जनतेकडून आलेल्या शुभेच्छा</h2>
      <h4>जनतेच्या मनातून उमटलेल्या प्रेमाच्या आणि आशीर्वादाच्या शुभेच्छा</h4>
      <div id="wishWall" class="wall"></div>
    </div>
    <canvas id="confetti-canvas"></canvas>
    <script>
      /* =====================================================
   🎯 TARGET DATE
===================================================== */
      const targetDate = new Date("February 16, 2026 00:00:00").getTime();

      /* =====================================================
   🎯 GOOGLE SHEET CONFIG
===================================================== */
      const sheetURL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vSd5FkUjJXUiNg_5GHbIz4ZjCzMZXupFXZZgM06dlxi0gNRRSXSEFl13sgyeGOWRU92VXemhYTp2KuY/pub?output=csv";

      const scriptURL =
        "https://script.google.com/macros/s/AKfycbwuRBwxs0KwTwC4yIyJQ6fbB326ZRkgxH25jFIAgbA8vPmC-aWN0mzxJPNb8J5NtXdasw/exec";

      /* =====================================================
   🎯 ELEMENTS
===================================================== */
      const daysEl = document.getElementById("days");
      const hoursEl = document.getElementById("hours");
      const minutesEl = document.getElementById("minutes");
      const secondsEl = document.getElementById("seconds");

      const wishesSection = document.getElementById("wishesSection");
      const wishWall = document.getElementById("wishWall");
      const wishImg = document.getElementById("wish-img");
      const cake = document.getElementById("candlesRow");

      /* =====================================================
   🎯 SAFE HELPERS
===================================================== */
      function escapeHTML(str = "") {
        return str.replace(
          /[&<>"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[m],
        );
      }

      /* =====================================================
   🎯 CANDLES
===================================================== */
      function updateCandles(daysLeft) {
        const totalCandles = 10;
        cake.innerHTML = "";

        let candlesToLight = 0;

        if (daysLeft > 0 && daysLeft <= totalCandles) {
          // During last 10 days
          candlesToLight = totalCandles - daysLeft;
        }

        if (daysLeft <= 0) {
          // 🎉 Birthday reached
          candlesToLight = totalCandles;
        }

        for (let i = 0; i < totalCandles; i++) {
          const candle = document.createElement("div");
          candle.className = "candle";

          if (i < candlesToLight) {
            candle.classList.add("lit");
          }

          cake.appendChild(candle);
        }
      }

      /* =====================================================
   🎯 LOAD APPROVED WISHES
===================================================== */
      function loadWishes() {
        fetch(sheetURL + "&t=" + Date.now())
          .then((res) => res.text())
          .then((csv) => {
            const rows = csv
              .trim()
              .split("\n")
              .map((r) =>
                r
                  .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                  .map((c) => c.replace(/^"|"$/g, "")),
              );

            wishWall.innerHTML = "";

            rows
              .slice(1)
              .reverse()
              .forEach((cols) => {
                const name = escapeHTML(cols[1] || "");
                const message = escapeHTML(cols[2] || "");
                const status = (cols[5] || "").trim().toLowerCase();

                if (status === "approved") {
                  wishWall.innerHTML += `
              <div class="wish-card">
                <h3>${name}</h3>
                <p>${message}</p>
              </div>
            `;
                }
              });
          });
      }

      /* =====================================================
   🎯 COUNTDOWN
===================================================== */
      let birthdayStarted = false;

      function updateCountdown() {
        const now = Date.now();
        const gap = targetDate - now;

        const second = 1000;
        const minute = second * 60;
        const hour = minute * 60;
        const day = hour * 24;

        if (gap <= 0) {
          if (!birthdayStarted) {
            birthdayStarted = true;

            updateCandles(0);
            wishImg.style.display = "block";
            wishesSection.style.display = "block";

            loadWishes(); // runs ONLY once
          }
          return;
        }

        const daysLeft = Math.floor(gap / day);

        daysEl.innerText = daysLeft;
        hoursEl.innerText = Math.floor((gap % day) / hour);
        minutesEl.innerText = Math.floor((gap % hour) / minute);
        secondsEl.innerText = Math.floor((gap % minute) / second);

        updateCandles(daysLeft);

        wishImg.style.display = "none";
        wishesSection.style.display = "none";
      }

      setInterval(updateCountdown, 1000);
      setInterval(loadWishes, 30000);

      updateCountdown();

      /* =====================================================
   🎯 FORM SUBMISSION
===================================================== */
      document
        .getElementById("birthdayForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          fetch(scriptURL, {
            method: "POST",
            body: new FormData(this),
          })
            .then(() => {
              window.location.href = "thankyou.html";
            })
            .catch(() => {
              alert("काहीतरी चूक झाली. कृपया पुन्हा प्रयत्न करा.");
            });
        });
    </script>
  </body>
</html>
