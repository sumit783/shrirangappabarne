<!doctype html>
<html>
  <head>
    <title>Thank You</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(45deg, #ff6ec4, #7873f5);
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
      }

      h1 {
        font-size: 50px;
        animation: pop 1s ease forwards;
      }

      @keyframes pop {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <h1>🎉 Thank You For Your Wishes! 🎂</h1>
  </body>
</html>
